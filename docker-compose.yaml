services:
  oc-db:
    image: postgres:16
    container_name: oc-db
    hostname: oc-db
    restart: always
    shm_size: 128mb
    environment:
      TZ: ${API_TIME_ZONE}
      POSTGRES_DB: ${API_DB_NAME}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASS}
      POSTGRES_INITDB_ARGS: '--auth=md5'
    volumes:
      - db_data:/var/lib/postgres/data
    ports:
      - '5432:5432'
    networks:
      - oc-net

volumes:
  db_data:

networks:
  oc-net:
    external: false
