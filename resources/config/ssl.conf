server {
    listen                     443 ssl;
    listen                [::]:443 ssl;
    http2                 on;
    server_name           one-coder.com;
    client_max_body_size  3072M;

    ssl_certificate       /ssl-crt/live/one-coder.com/fullchain.pem;
    ssl_certificate_key   /ssl-crt/live/one-coder.com/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    ssl_session_timeout   1d;
    ssl_session_cache     shared:SSL:10m;
    ssl_session_tickets   off;

    root                  /usr/share/nginx/html;
    index                 index.html index.htm;

    add_header            Strict-Transport-Security "max-age=2592000" always;

    location ~* \.(js|css|map|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files         $uri =404;
        expires           1y;
        access_log        off;
    }

    location / {
        try_files         $uri $uri/ /index.html;
    }

    location ~ ^/api/(.*)$ {
        proxy_pass        http://api:8000/$1$is_args$args;
        proxy_set_header  Host                $host;
        proxy_set_header  X-Real-IP           $remote_addr;
        proxy_set_header  X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto   $scheme;
        proxy_set_header  X-Forwarded-Port    $server_port;
        proxy_set_header  X-Forwarded-Host    $host;

        proxy_set_header  Upgrade             $http_upgrade;
        proxy_set_header  Connection          "upgrade";

        proxy_connect_timeout 3000;
        proxy_send_timeout    3000;
        proxy_read_timeout    3000;
        send_timeout          3000;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
